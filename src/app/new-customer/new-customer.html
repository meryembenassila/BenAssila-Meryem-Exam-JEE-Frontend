@if (errorMessage){
  <div class="alert alert-danger mt-3">
    {{errorMessage|json}}
  </div>
}
<div class="col-6 offset-3 mt-5" >
  <div class="card">

    <div class="card-header">
      NewCustomer
    </div>
    <div class="card-body">
      <form [formGroup]="ForrmNewCustomer"  (ngSubmit)="handelNewCustomer()" >
        <div class="form-group">
          <label >Name</label>
          <input type="text"  formControlName="name" class="form-control" placeholder="user1">
        </div>
        <div class="form-group">
          <label >Email</label>
          <input type="email" formControlName="email" class="form-control"  placeholder="Email">
        </div>
        <button [disabled]="!ForrmNewCustomer.valid"  type="submit" class="btn btn-primary mt-2">Ajouter</button>
      </form>
    </div>
  </div>

</div>
