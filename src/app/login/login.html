<div class="container mt-5 ">
  <div class="col-6 offset-3">
    <div class="card">
      <div class="card-header">
        Authentification
      </div>
      <div class="card-body">
        <form [formGroup]="FormLogin" (ngSubmit)="handeLoginCustomer()" >
          <div class="form-group">
            <label >Username</label>
            <input formControlName="username" type="text" class="form-control" placeholder="Enter username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input formControlName="password" type="password" class="form-control"  placeholder="Password">
          </div>
          <button type="submit" class="btn btn-primary mt-3">Submit</button>
        </form>

      </div>
    </div>
  </div>


</div>
